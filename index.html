<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>PriAxom AI Pro | Vision AI by Priyam Kesh</title>
    <meta name="description" content="PriAxom AI Pro (PriAxom Pro) is an advanced, proprietary artificial intelligence with Vision capabilities developed entirely by Priyam Kesh.">
    <meta name="keywords" content="PriAxom ai pro, priyam kesh, PriAxom Pro, PriAxom HyperEngine, atheist.8825, advanced AI chatbot, vision AI, image recognition">
    <meta name="author" content="Priyam Kesh">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <link rel="canonical" href="https://priyamkesh.github.io/PriAxomPRO/">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://priyamkesh.github.io/PriAxomPRO/">
    <meta property="og:title" content="PriAxom AI Pro | Vision AI by Priyam Kesh">
    <meta property="og:description" content="PriAxom AI Pro is an advanced artificial intelligence built by Priyam Kesh. Explore the limits of the custom-built PriAxom HyperEngine with Image Scanning.">
    <meta property="og:site_name" content="PriAxom AI Pro">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "PriAxom AI Pro",
          "alternateName": "PriAxom Pro",
          "url": "https://priyamkesh.github.io/PriAxomPRO/",
          "applicationCategory": "WebApplication, Artificial Intelligence",
          "description": "PriAxom AI Pro is a highly advanced artificial intelligence chatbot with Vision and OCR capabilities, developed by Priyam Kesh.",
          "operatingSystem": "All",
          "author": { "@id": "https://priyamkesh.github.io/PriAxomPRO/#priyamkesh" }
        },
        {
          "@type": "Person",
          "@id": "https://priyamkesh.github.io/PriAxomPRO/#priyamkesh",
          "name": "Priyam Kesh",
          "url": "https://priyamkesh.github.io/PriAxomPRO/",
          "description": "Creator and sole developer of PriAxom AI Pro.",
          "sameAs": ["https://instagram.com/atheist.8825", "https://github.com/priyamkesh"]
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-left">
            <h1 class="title" title="PriAxom AI Pro">PriAxom AI Pro<span class="copyright">©</span></h1>
            <p class="author" title="Developed by Priyam Kesh">By, Priyam Kesh</p>
        </div>
        <div class="header-right">
            <a href="https://priyamkesh.github.io/PriAxomPRO/" class="home-btn" aria-label="Home">HOME</a>
        </div>
    </header>

    <main class="chat-area" id="chat-history" aria-live="polite" aria-atomic="false" role="log"></main>

    <div class="preview-container" id="preview-container">
        <div class="preview-box">
            <img id="image-preview" src="" alt="Preview">
            <button id="remove-image-btn" aria-label="Remove image">&times;</button>
        </div>
    </div>

    <footer class="input-bar">
        <div class="attach-wrapper">
            <button id="attach-btn" aria-label="Attach Image">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <div class="attach-menu" id="attach-menu">
                <button id="camera-option">📸 Camera</button>
                <button id="gallery-option">🖼️ Gallery</button>
            </div>
        </div>
        
        <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
        <input type="file" id="gallery-input" accept="image/*" hidden>

        <input type="text" id="user-input" placeholder="Message PriAxom AI Pro..." autocomplete="off" aria-label="Type your message">
        <button id="send-btn" aria-label="Send message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
        </button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
