<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PriAxom AI Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-left">
            <h1 class="title">PriAxom AI Pro<span class="copyright">©</span></h1>
            <p class="author">By, Priyam Kesh</p>
        </div>
        <div class="header-right">
            <a href="https://priyamkesh.github.io/priaxom/" class="home-btn">HOME</a>
        </div>
    </header>

    <main class="chat-area" id="chat-history"></main>

    <footer class="input-bar">
        <input type="text" id="user-input" placeholder="Message PriAxom AI..." autocomplete="off">
        <button id="send-btn" aria-label="Send Message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
