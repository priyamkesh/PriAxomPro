<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>PriAxom AI Pro | By Priyam Kesh</title>
    <meta name="description" content="PriAxom AI Pro is an advanced, proprietary artificial intelligence developed entirely by Priyam Kesh.">
    <meta name="keywords" content="PriAxom ai pro, priyam kesh, PriAxom Pro, PriAxom HyperEngine, atheist.8825">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar-overlay" class="hidden"></div>
    <div id="sidebar-menu">
        <button id="close-sidebar" aria-label="Close Menu">&times;</button>
        <div class="sidebar-header">
            <h2 class="title">PriAxom AI Pro<span class="copyright">©</span></h2>
        </div>
        <nav class="sidebar-nav">
            <a href="#" id="nav-home">🏠 Home</a>
            <a href="https://priyamkesh.github.io/priaxom/" id="nav-priaxom">🌐 PriAxom Main</a>
            <button id="nav-login" class="nav-btn">🔑 Login</button>
            <button id="nav-logout" class="nav-btn hidden">🚪 Logout</button>
        </nav>
    </div>

    <div id="login-screen" class="login-container">
        <div class="login-box">
            <h1 class="title">PriAxom AI Pro<span class="copyright">©</span></h1>
            <p class="login-subtitle">Authenticate to access the HyperEngine.</p>
            <button id="google-login-btn" class="google-btn">
                <svg viewBox="0 0 48 48" width="24px" height="24px">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                    <path fill="none" d="M0 0h48v48H0z"></path>
                </svg>
                <span id="login-text">Sign in with Google</span>
            </button>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <header>
            <div class="header-left">
                <button id="menu-btn" aria-label="Open Menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="header-titles">
                    <h1 class="title">PriAxom AI Pro<span class="copyright">©</span></h1>
                    <p class="author">By, Priyam Kesh</p>
                </div>
            </div>
            <div class="header-right">
                <button id="fullscreen-btn" aria-label="Toggle Fullscreen">
                    <svg id="fs-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                    <svg id="fs-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path></svg>
                </button>
            </div>
        </header>

        <main class="chat-area" id="chat-history"></main>

        <div class="preview-container" id="preview-container">
            <div class="preview-box">
                <img id="image-preview" src="" alt="Preview">
                <button id="remove-image-btn">&times;</button>
            </div>
        </div>

        <footer class="input-bar">
            <div class="attach-wrapper">
                <button id="attach-btn" aria-label="Attach">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <div class="attach-menu" id="attach-menu">
                    <button id="camera-option">📸 Camera</button>
                    <button id="gallery-option">🖼️ Gallery</button>
                </div>
            </div>
            
            <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
            <input type="file" id="gallery-input" accept="image/*" hidden>

            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Message PriAxom AI Pro..." autocomplete="off">
                <button id="mic-btn" aria-label="Voice Input">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
            </div>

            <button id="send-btn" aria-label="Send">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
            </button>
        </footer>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
