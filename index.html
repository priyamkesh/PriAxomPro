<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>PriAxom AI Pro | Vision & Mathematics by Priyam Kesh</title>
    <meta name="description" content="PriAxom AI Pro (PriAxom Pro) is a powerful, proprietary artificial intelligence for complex math and image analysis, developed entirely by Priyam Kesh. Experience the power of the PriAxom HyperEngine.">
    <meta name="keywords" content="PriAxom ai pro, priyam kesh, PriAxom Pro, PriAxom HyperEngine, atheist.8825, advanced AI chatbot, vision AI, math AI, OCR, Llama 3.1 70B, glassmorphism AI">
    <meta name="author" content="Priyam Kesh">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <link rel="canonical" href="https://priyamkesh.github.io/PriAxomPRO/">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-left">
            <h1 class="title" title="PriAxom AI Pro">PriAxom AI Pro<span class="copyright">©</span></h1>
            <p class="author" title="Developed by Priyam Kesh">By, Priyam Kesh</p>
        </div>
        <div class="header-right">
            <a href="https://priyamkesh.github.io/PriAxomPRO/" class="home-btn" aria-label="Home - PriAxom AI Pro">HOME</a>
        </div>
    </header>

    <main class="chat-area" id="chat-history" aria-live="polite" aria-atomic="false" role="log"></main>

    <div class="preview-container" id="preview-container">
        <div class="preview-box">
            <img id="image-preview" src="" alt="Preview of attached mathematical query">
            <button id="remove-image-btn" aria-label="Remove image and clear analysis">&times;</button>
        </div>
    </div>

    <footer class="input-bar">
        <div class="attach-wrapper">
            <button id="attach-btn" aria-label="Attach Image Menu (Camera or Gallery)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <div class="attach-menu" id="attach-menu">
                <button id="camera-option" aria-label="Open Camera and solve problem">📸 Camera</button>
                <button id="gallery-option" aria-label="Choose image from Gallery and scan">🖼️ Gallery</button>
            </div>
        </div>
        
        <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
        <input type="file" id="gallery-input" accept="image/*" hidden>

        <input type="text" id="user-input" placeholder="Message PriAxom AI Pro..." autocomplete="off" aria-label="Chat with PriAxom AI Pro, powered by Llama 3.1 70B">
        <button id="send-btn" aria-label="Send message or mathematical inquiry to PriAxom Pro">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
        </button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
